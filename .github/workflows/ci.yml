name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  style:
    name: Style & static checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y clang-format clang-tidy cmake ninja-build
      - name: Clone vcpkg
        run: git clone --depth 1 https://github.com/microsoft/vcpkg.git /opt/vcpkg
      - name: Bootstrap vcpkg
        run: /opt/vcpkg/bootstrap-vcpkg.sh
      - name: Configure (vcpkg manifest mode)
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE=/opt/vcpkg/scripts/buildsystems/vcpkg.cmake \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
      - name: clang-format check
        run: find src tests \( -name '*.cpp' -o -name '*.h' -o -name '*.mm' \) | xargs clang-format --dry-run -Werror
      - name: clang-tidy (src)
        run: find src \( -name '*.cpp' -o -name '*.h' \) | xargs clang-tidy -p build --config-file=.clang-tidy

  build-windows:
    name: Build (Windows)
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - name: Clone vcpkg
        run: git clone --depth 1 https://github.com/microsoft/vcpkg.git /c/vcpkg-duke
      - name: Bootstrap vcpkg
        run: /c/vcpkg-duke/bootstrap-vcpkg.sh
      - name: Configure & build
        run: |
          cmake -S . -B build \
            -DCMAKE_TOOLCHAIN_FILE=/c/vcpkg-duke/scripts/buildsystems/vcpkg.cmake
          cmake --build build --config Release
      - name: Tests
        run: ctest --test-dir build -C Release --output-on-failure
      - name: Smoke (--version)
        run: ./build/Release/duke_recorder.exe --version
      - name: Install ffprobe
        run: choco install -y ffmpeg
      - name: Record & validate
        run: |
          ./build/Release/duke_recorder.exe --record --out out.h264 --duration 3 --fps 15
          ffprobe -v error -count_frames -select_streams v:0 \
            -show_entries stream=codec_name,nb_read_frames -of default out.h264

  build-macos:
    name: Build (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Clone vcpkg
        run: git clone --depth 1 https://github.com/microsoft/vcpkg.git /tmp/vcpkg
      - name: Bootstrap vcpkg
        run: /tmp/vcpkg/bootstrap-vcpkg.sh
      - name: Configure & build
        run: |
          cmake -S . -B build \
            -DCMAKE_TOOLCHAIN_FILE=/tmp/vcpkg/scripts/buildsystems/vcpkg.cmake
          cmake --build build
      - name: Tests
        run: ctest --test-dir build --output-on-failure
      - name: Smoke (--version)
        run: ./build/duke_recorder --version
