repos:
  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v17.0.6
    hooks:
      - id: clang-format
        files: \.(cpp|h|mm|hpp)$
        exclude: ^(build|third_party|electron/node_modules)/
  - repo: https://github.com/cpplint/cpplint
    rev: 1.6.1
    hooks:
      - id: cpplint
        args: ["--linelength=100"]
        files: \.(cpp|h|mm|hpp)$
        exclude: ^(build|third_party|electron/node_modules)/
